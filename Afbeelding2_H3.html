<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    img {
      width: 100%;
      display: block;
      cursor: zoom-in;
    }
  </style>
</head>
<body>
  <img
    src="https://jonathan1-2.github.io/afbeelding_experiment/Afbeelding2_Hoofdstuk3_Handboek.png"
    alt="Screenshot"
    onclick="stuurBericht()"
  >

  <script>
    function stuurBericht() {
      window.parent.postMessage({
        type: 'openImage',
        src: 'https://jonathan1-2.github.io/afbeelding_experiment/Afbeelding2_Hoofdstuk3_Handboek.png'
      }, '*');
    }
  </script>
</body>
</html>
